; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Core Baud Rate & Console Translation Filters ---
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- Hardware Memory Mapping (16MB Flash / 8MB Octal PSRAM) ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; --- Active Framework Build Flag Directives ---
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3  ; Enables helpful internal system/network warnings in monitor

; --- Dependency Library Management Pipeline ---
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4  ; UPGRADED: Dynamic memory management for safe JSON streams
    4-20ma/ModbusMaster@^2.0.1
